name: Update Results

on:
  schedule:
    # Every 2 hours, June 11 – July 20 (tournament window)
    - cron: "0 */2 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch and merge results
        run: python scripts/update-results.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MATCH_COUNT=$(python -c "import json,sys; d=json.load(open('data/results.json')); print(len(d))" 2>/dev/null || echo "?")
            git commit -m "chore: update results.json (${MATCH_COUNT} completed matches)"
            git push
          fi
