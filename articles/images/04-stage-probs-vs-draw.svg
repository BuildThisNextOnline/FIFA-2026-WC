<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Stage Probabilities vs Tournament Draw: Two Different Questions</title>
  <desc>Left panel shows Stage Probabilities aggregating many simulated paths. Right panel shows Tournament Draw as a single deterministic bracket. Both can show different teams advancing and both are correct.</desc>

  <rect width="720" height="380" fill="#0f1117"/>

  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#e8eaf0">Two Views, Two Questions</text>

  <!-- Left panel: Stage Probabilities -->
  <rect x="20" y="40" width="326" height="240" rx="8" fill="#111827" stroke="#3b5bdb" stroke-width="2"/>
  <rect x="20" y="40" width="326" height="32" rx="8" fill="#1e3a5f"/>
  <rect x="20" y="60" width="326" height="12" fill="#1e3a5f"/>
  <text x="183" y="61" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd">STAGE PROBABILITIES</text>

  <text x="40" y="95" text-anchor="start" font-size="10" fill="#64748b">10,000 simulated tournaments — group outcomes vary each run</text>

  <!-- Simulated path lines -->
  <line x1="60" y1="115" x2="200" y2="145" stroke="#1e40af" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="115" x2="200" y2="165" stroke="#1e40af" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="115" x2="200" y2="185" stroke="#1e40af" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="115" x2="200" y2="205" stroke="#1e40af" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="115" x2="200" y2="225" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="115" x2="200" y2="245" stroke="#1e40af" stroke-width="1" opacity="0.2"/>

  <circle cx="60" cy="115" r="8" fill="#3b5bdb"/>
  <text x="60" y="119" text-anchor="middle" font-size="8" fill="#fff">ENG</text>

  <text x="210" y="149" text-anchor="start" font-size="9" fill="#94a3b8">path A (easy draw)</text>
  <text x="210" y="169" text-anchor="start" font-size="9" fill="#94a3b8">path B</text>
  <text x="210" y="189" text-anchor="start" font-size="9" fill="#94a3b8">path C</text>
  <text x="210" y="209" text-anchor="start" font-size="9" fill="#94a3b8">path D (France R16)</text>
  <text x="210" y="229" text-anchor="start" font-size="9" fill="#64748b">path E</text>
  <text x="210" y="249" text-anchor="start" font-size="9" fill="#475569">path F…</text>

  <rect x="40" y="258" width="286" height="14" rx="3" fill="#1f2937"/>
  <rect x="40" y="258" width="71" height="14" rx="3" fill="#3b5bdb"/>
  <text x="115" y="269" text-anchor="start" font-size="10" fill="#93c5fd">England QF% = 25%  (avg across all paths)</text>

  <!-- Right panel: Tournament Draw -->
  <rect x="374" y="40" width="326" height="240" rx="8" fill="#111827" stroke="#7c3aed" stroke-width="2"/>
  <rect x="374" y="40" width="326" height="32" rx="8" fill="#2e1a4a"/>
  <rect x="374" y="60" width="326" height="12" fill="#2e1a4a"/>
  <text x="537" y="61" text-anchor="middle" font-size="12" font-weight="700" fill="#c4b5fd">TOURNAMENT DRAW</text>

  <text x="394" y="95" text-anchor="start" font-size="10" fill="#64748b">One specific bracket — most likely group outcomes</text>

  <rect x="394" y="108" width="64" height="22" rx="3" fill="#1f2937" stroke="#4c1d95" stroke-width="1"/>
  <text x="426" y="123" text-anchor="middle" font-size="9" fill="#a78bfa">England</text>
  <rect x="394" y="136" width="64" height="22" rx="3" fill="#1f2937" stroke="#4c1d95" stroke-width="1"/>
  <text x="426" y="151" text-anchor="middle" font-size="9" fill="#a78bfa">France</text>

  <line x1="458" y1="119" x2="472" y2="119" stroke="#4c1d95" stroke-width="1"/>
  <line x1="458" y1="147" x2="472" y2="147" stroke="#4c1d95" stroke-width="1"/>
  <line x1="472" y1="119" x2="472" y2="147" stroke="#4c1d95" stroke-width="1"/>
  <line x1="472" y1="133" x2="486" y2="133" stroke="#4c1d95" stroke-width="1"/>

  <rect x="486" y="122" width="64" height="22" rx="3" fill="#2e1a4a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="518" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="#c4b5fd">France ✓</text>

  <text x="426" y="175" text-anchor="middle" font-size="8.5" fill="#ef4444">England loses R16</text>
  <text x="426" y="189" text-anchor="middle" font-size="8" fill="#64748b">(France 60% head-to-head)</text>

  <text x="394" y="220" text-anchor="start" font-size="9" fill="#64748b">In this specific bracket:</text>
  <rect x="394" y="225" width="286" height="14" rx="3" fill="#1f2937"/>
  <text x="394" y="236" text-anchor="start" font-size="10" fill="#ef4444">England QF% = 0%  (out in R16 here)</text>

  <!-- Explanation box -->
  <rect x="20" y="294" width="680" height="72" rx="8" fill="#131f2e" stroke="#1e3a5f" stroke-width="1.5"/>

  <circle cx="44" cy="320" r="5" fill="#3b5bdb"/>
  <text x="56" y="324" text-anchor="start" font-size="11" fill="#cbd5e1"><tspan font-weight="600" fill="#93c5fd">Stage Probabilities</tspan> = average across all possible draws England could get</text>

  <circle cx="44" cy="348" r="5" fill="#7c3aed"/>
  <text x="56" y="352" text-anchor="start" font-size="11" fill="#cbd5e1"><tspan font-weight="600" fill="#c4b5fd">Tournament Draw</tspan> = one specific bracket where England faces France in R16</text>

  <line x1="20" y1="368" x2="700" y2="368" stroke="#1e2433" stroke-width="1"/>
  <text x="360" y="378" text-anchor="middle" font-size="10" fill="#475569">Both numbers are correct. They answer different questions.</text>
</svg>
