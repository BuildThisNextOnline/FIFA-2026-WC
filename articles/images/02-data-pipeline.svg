<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Data Pipeline: Three Layers, Zero Backend</title>
  <desc>Data flows from openfootball live feed into results.json via GitHub Action, then into localStorage cache, then into the UI.</desc>

  <rect width="720" height="300" fill="#0f1117"/>

  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#e8eaf0">Data Pipeline: Three Layers, Zero Backend</text>

  <!-- Layer 1: Live Feed -->
  <rect x="40" y="55" width="150" height="80" rx="8" fill="#1a2a1a" stroke="#16a34a" stroke-width="2"/>
  <text x="115" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">LIVE FEED</text>
  <text x="115" y="97" text-anchor="middle" font-size="10" fill="#86efac">openfootball</text>
  <text x="115" y="112" text-anchor="middle" font-size="10" fill="#86efac">worldcup.json</text>
  <text x="115" y="127" text-anchor="middle" font-size="9" fill="#4b7a4b">GitHub raw · CORS-friendly</text>

  <!-- Arrow 1 to 2 -->
  <line x1="192" y1="95" x2="238" y2="95" stroke="#475569" stroke-width="2"/>
  <polygon points="236,90 246,95 236,100" fill="#475569"/>
  <text x="215" y="83" text-anchor="middle" font-size="9" fill="#64748b">GitHub</text>
  <text x="215" y="113" text-anchor="middle" font-size="9" fill="#64748b">Action</text>
  <text x="215" y="124" text-anchor="middle" font-size="9" fill="#64748b">every 2h</text>

  <!-- Layer 2: results.json -->
  <rect x="248" y="55" width="150" height="80" rx="8" fill="#1a1f2e" stroke="#3b5bdb" stroke-width="2"/>
  <text x="323" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#818cf8">results.json</text>
  <text x="323" y="97" text-anchor="middle" font-size="10" fill="#93c5fd">Committed to repo</text>
  <text x="323" y="112" text-anchor="middle" font-size="10" fill="#93c5fd">auto-deploys</text>
  <text x="323" y="127" text-anchor="middle" font-size="9" fill="#3d4f7a">What the app reads</text>

  <!-- Arrow 2 to 3 -->
  <line x1="400" y1="95" x2="446" y2="95" stroke="#475569" stroke-width="2"/>
  <polygon points="444,90 454,95 444,100" fill="#475569"/>
  <text x="423" y="83" text-anchor="middle" font-size="9" fill="#64748b">fetch</text>
  <text x="423" y="113" text-anchor="middle" font-size="9" fill="#64748b">+ merge</text>

  <!-- Layer 3: localStorage -->
  <rect x="456" y="55" width="150" height="80" rx="8" fill="#1f1a2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="531" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">localStorage</text>
  <text x="531" y="97" text-anchor="middle" font-size="10" fill="#ddd6fe">30-min TTL cache</text>
  <text x="531" y="112" text-anchor="middle" font-size="10" fill="#ddd6fe">Works offline</text>
  <text x="531" y="127" text-anchor="middle" font-size="9" fill="#5b4a7a">On repeat visits</text>

  <!-- Arrow 3 to UI -->
  <line x1="608" y1="95" x2="640" y2="95" stroke="#475569" stroke-width="2"/>
  <polygon points="638,90 648,95 638,100" fill="#475569"/>

  <!-- UI box -->
  <rect x="650" y="68" width="56" height="54" rx="6" fill="#0f1117" stroke="#475569" stroke-width="1.5"/>
  <text x="678" y="90" text-anchor="middle" font-size="10" fill="#94a3b8">UI</text>
  <text x="678" y="106" text-anchor="middle" font-size="10" fill="#94a3b8">renders</text>

  <!-- Separator -->
  <line x1="40" y1="160" x2="680" y2="160" stroke="#1e2433" stroke-width="1"/>

  <!-- Bracket structure section -->
  <text x="360" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Bracket structure is separate</text>

  <rect x="180" y="196" width="360" height="68" rx="8" fill="#1a1f2e" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="218" text-anchor="middle" font-size="11" fill="#cbd5e1">Fixture schedule contains placeholders</text>

  <rect x="200" y="228" width="70" height="24" rx="4" fill="#0f1117" stroke="#3b5bdb" stroke-width="1"/>
  <text x="235" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#818cf8">W73</text>

  <rect x="285" y="228" width="70" height="24" rx="4" fill="#0f1117" stroke="#3b5bdb" stroke-width="1"/>
  <text x="320" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#818cf8">1A</text>

  <rect x="370" y="228" width="70" height="24" rx="4" fill="#0f1117" stroke="#3b5bdb" stroke-width="1"/>
  <text x="405" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#818cf8">3B/D/F</text>

  <text x="455" y="244" text-anchor="start" font-size="10" fill="#64748b">resolved at display time</text>
</svg>
